<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daniel Panea - Private AI for companies that value their data</title>
    <meta name="description" content="AI systems built around your workflows and deployed where your data needs to stay.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://danielpanea.com/en/">
    <link rel="alternate" hreflang="en" href="https://danielpanea.com/en/">
    <link rel="alternate" hreflang="de" href="https://danielpanea.com/de/">
    <link rel="alternate" hreflang="es" href="https://danielpanea.com/es/">
    <link rel="alternate" hreflang="x-default" href="https://danielpanea.com/">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta http-equiv="refresh" content="3; url=/en/">
    <script>
        (function () {
            var supported = {
                de: '/de/',
                es: '/es/',
                en: '/en/'
            };
            var languages = navigator.languages && navigator.languages.length
                ? navigator.languages
                : [navigator.language || navigator.userLanguage || 'en'];
            var target = '/en/';
            var suffix = window.location.search + window.location.hash;

            for (var i = 0; i < languages.length; i += 1) {
                var code = String(languages[i]).toLowerCase().split('-')[0];
                if (supported[code]) {
                    target = supported[code];
                    break;
                }
            }

            window.location.replace(target + suffix);
        }());
    </script>
</head>
<body>
    <p>Redirecting to <a href="/en/">the English homepage</a>.</p>
</body>
</html>
